title: "IT'S YOUR FUTURE"
description: "Percorsi ludico-didattici ITS: quiz, missioni, escape game rapidi e simulazioni tecniche."
lang: it

# Testi hero homepage — modificabili da qui
hero:
  kicker: "Percorsi didattico-orientativi ITS"
  title: "IT'S YOUR FUTURE"
  description: "Una selezione (in crescita) di Micro-attività da 3–7 minuti per scoprire i corsi ITS attraverso quiz, missioni, goichi rapidi e simulazioni tecniche. Scegli un percorso e immergiti nel ruolo del tecnico superiore. In fase di costruzione"

# Sezione "Come funziona" homepage — modificabile da qui
come_funziona:
  titolo: "Come funziona:"
  testo: 'ogni scheda presenta un''attività ludico-didattica collegata a un corso ITS. Clicca su <em>Scopri l''attività</em> per leggere scenario, prove, codice finale e competenze.'

logo:
  src: "/img/logo-placeholder.png"
  alt: "IT'S YOUR FUTURE"
# Necessario per GitHub Pages (project site): senza baseurl il CSS viene cercato
# su https://vongomben.github.io/assets/... invece che su .../its-your-future/assets/...
baseurl: "/its-your-future"
url: "https://vongomben.github.io"

markdown: kramdown
kramdown:
  input: GFM
  syntax_highlighter: rouge

sass:
  style: compressed

plugins: []

collections:
  progetti:
    output: true
    permalink: /progetti/:name/
    sort_by: order

defaults:
  - scope:
      path: ""
    values:
      layout: default
  - scope:
      path: ""
      type: progetti
    values:
      layout: progetto

exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - its-your-future-jekyll-template.md
  - vendor
