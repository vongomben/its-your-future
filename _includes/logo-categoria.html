{% assign info = site.data.gruppi[include.gruppo] %}
{% if info %}
{% assign size = include.size | default: "sm" %}
{% if include.link == true and info.contatti_url %}
<a class="iyf-cat-logo-link" href="{{ info.contatti_url }}" target="_blank" rel="noopener" aria-label="Contatti {{ info.nome }}">
{% endif %}
<img
  src="{{ info.logo | relative_url }}"
  alt="{{ info.alt }}"
  class="iyf-cat-logo iyf-cat-logo--{{ size }}"
  width="120"
  height="36"
  decoding="async"
  loading="lazy"
>
{% if include.link == true and info.contatti_url %}
</a>
{% endif %}
{% endif %}
